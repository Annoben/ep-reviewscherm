<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EuroParcs Maasduinen — Reviewscherm</title>
<style>
  :root{
    --ep-green:#3C6E47; --ep-green-dark:#2C5235; --ep-green-deep:#1E3A28;
    --ep-sand:#F5F1E8; --ep-cream:#FBF9F4; --ep-gold:#C8A24C;
    --ep-ink:#23312A; --ep-ink-soft:#5C6B62; --ep-line:#E4DECF;
    --booking:#003580; --zoover:#FF6A00; --google:#4285F4; --special:#1F9C8A;
    --card-radius:22px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:"Segoe UI","Helvetica Neue",Arial,sans-serif;color:var(--ep-ink);
    background:
      radial-gradient(1200px 500px at 85% -5%, rgba(200,162,76,.10), transparent 60%),
      radial-gradient(900px 500px at 0% 100%, rgba(60,110,71,.10), transparent 55%),
      var(--ep-cream);
    min-height:100vh;padding:34px 44px 24px;
  }
  body::before{content:"";position:fixed;left:0;right:0;top:0;height:6px;
    background:linear-gradient(90deg,var(--ep-green),var(--ep-gold),var(--ep-green));z-index:5;}

  header{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;}
  .brand{display:flex;align-items:center;gap:16px;}
  .title-block .eyebrow{text-transform:uppercase;letter-spacing:.26em;font-size:11px;color:var(--ep-gold);font-weight:700;}
  .brandmark-row{display:flex;align-items:center;gap:13px;}
  .ep-mark{width:46px;height:46px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .ep-mark-img{max-width:100%;max-height:100%;object-fit:contain;display:block;}
  .eyebrow-lg{font-size:17px;letter-spacing:.20em;}
  .title-block h1{margin:2px 0 0;font-size:26px;font-weight:800;letter-spacing:-.01em;}
  .title-block .eyebrow-title{margin:0;font-size:26px;font-weight:800;letter-spacing:-.01em;color:var(--ep-ink);}

  .clock-block{text-align:right;}
  .clock{font-size:28px;font-weight:800;color:var(--ep-green);font-variant-numeric:tabular-nums;}
  .refresh-note{display:inline-flex;align-items:center;gap:7px;margin-top:5px;font-size:12px;color:var(--ep-ink-soft);}
  .refresh-note .spin{width:12px;height:12px;border-radius:50%;border:2px solid var(--ep-line);border-top-color:var(--ep-green);animation:spin 1.4s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .park-switch{display:flex;gap:10px;margin-bottom:22px;align-items:center;}
  .park-dd{position:relative;}
  .park-dd-btn{display:inline-flex;align-items:center;gap:10px;padding:9px 14px;border:2px solid var(--ep-green);
    background:#F3F7F2;border-radius:12px;cursor:pointer;font:inherit;color:var(--ep-green);
    box-shadow:0 2px 8px rgba(35,49,42,.06);transition:all .15s ease;}
  .park-dd-btn:hover{box-shadow:0 5px 14px rgba(60,110,71,.15);}
  .pdd-mark{width:24px;height:24px;border-radius:50%;background:#fff;border:1px solid #cfe0d4;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .pdd-mark svg{width:15px;height:15px;}
  .pdd-name{font-weight:800;font-size:14px;color:var(--ep-green);}
  .pdd-chev{color:var(--ep-green);transition:transform .18s ease;}
  .park-dd.open .pdd-chev{transform:rotate(180deg);}
  .park-dd-list{position:absolute;top:calc(100% + 6px);left:0;min-width:260px;background:#fff;
    border:1px solid var(--ep-line);border-radius:12px;box-shadow:0 10px 28px rgba(35,49,42,.16);
    padding:5px;z-index:30;display:none;max-height:60vh;overflow:auto;}
  .park-dd.open .park-dd-list{display:block;}
  .pdd-item{display:block;width:100%;text-align:left;padding:9px 12px;border:none;background:none;
    border-radius:8px;font:inherit;font-size:13.5px;color:var(--ep-ink);cursor:pointer;}
  .pdd-item:hover{background:var(--ep-sand);}
  .pdd-item.active{background:#F3F7F2;color:var(--ep-green);font-weight:800;}

  /* Reviewsite-rail rechts, rond afgewerkt tegen de rand */
  .rail{position:fixed;top:120px;right:0;display:flex;flex-direction:column;gap:9px;
    background:#fff;border:1px solid var(--ep-line);border-right:none;
    border-radius:14px 0 0 14px;padding:12px 8px;box-shadow:-4px 0 16px rgba(35,49,42,.06);z-index:20;}
  .rail .toggle-btn{padding:0;border:none;background:none;box-shadow:none;}
  .rail .toggle-ic{width:30px;height:30px;border-radius:9px;border:2px solid var(--ep-green);
    display:flex;align-items:center;justify-content:center;color:#fff;transition:all .15s ease;}
  .rail .toggle-ic svg{width:20px;height:20px;}
  .rail .toggle-btn:hover{transform:translateY(-1px);}
  .rail .toggle-btn.off .toggle-ic{opacity:.4;filter:grayscale(.75);border-color:var(--ep-line);}
  body{padding-right:60px;}

  .toggle-row{display:flex;gap:12px;margin-bottom:22px;flex-wrap:wrap;align-items:center;}
  .toggle-hint{font-size:12px;color:var(--ep-ink-soft);margin-right:4px;}
  .toggle-btn{display:flex;align-items:center;justify-content:center;padding:9px;border-radius:14px;
    border:2px solid var(--ep-line);background:#fff;cursor:pointer;transition:all .18s ease;
    box-shadow:0 2px 6px rgba(35,49,42,.05);}
  .toggle-btn:hover{transform:translateY(-1px);box-shadow:0 5px 14px rgba(35,49,42,.10);}
  .toggle-btn.active{border-color:var(--ep-green);background:#F3F7F2;box-shadow:0 6px 18px rgba(60,110,71,.15);}
  .toggle-ic{width:38px;height:38px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;}
  .toggle-ic svg{width:28px;height:28px;display:block;}
  .toggle-btn.off{opacity:.45;filter:grayscale(.75);}

  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;align-items:start;}
  @media(max-width:1500px){.grid{grid-template-columns:repeat(2,1fr);}}
  @media(max-width:820px){.grid{grid-template-columns:1fr;}}

  .card{background:#fff;border:1px solid var(--ep-line);border-radius:var(--card-radius);
    padding:22px 20px 20px;display:flex;flex-direction:column;min-height:420px;
    box-shadow:0 10px 30px rgba(35,49,42,.06);position:relative;overflow:hidden;}
  .card.hidden{display:none;}
  .card::before{content:"";position:absolute;top:0;left:0;right:0;height:5px;background:var(--accent);}

  .card-head{display:flex;align-items:center;gap:11px;margin-bottom:18px;}
  .site-ic{width:42px;height:42px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;}
  .site-ic svg{width:25px;height:25px;}
  .site-name{font-weight:800;font-size:16px;line-height:1.1;}
  .site-url{font-size:11px;color:var(--ep-ink-soft);}

  .no-review{font-style:italic;color:#9a9488;}
  .verdict{display:none;}
  .card-head-link{text-decoration:none;color:inherit;display:block;border-radius:10px;transition:opacity .15s ease;}
  .card-head-link:hover{opacity:.72;}
  .card-head-link:hover .site-name{text-decoration:underline;}
  .score-wrap{display:flex;align-items:baseline;gap:7px;margin-bottom:2px;}
  .score{font-size:54px;font-weight:800;line-height:1;letter-spacing:-.02em;color:var(--accent);}
  .score-max{font-size:19px;font-weight:700;color:var(--ep-ink-soft);}
  .count{font-size:12px;color:var(--ep-ink-soft);}
  .bar{height:7px;border-radius:99px;background:var(--ep-sand);margin:14px 0 18px;overflow:hidden;}
  .bar span{display:block;height:100%;border-radius:99px;background:var(--accent);width:0;transition:width 1.1s cubic-bezier(.2,.7,.2,1);}

  .latest-tag{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--ep-ink-soft);font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
  .latest-tag::before{content:"";width:13px;height:13px;border-radius:3px;background:var(--accent);opacity:.85;}
  .quote{background:var(--ep-cream);border-radius:12px;padding:14px 15px;font-size:14px;line-height:1.5;flex:1;border:1px solid var(--ep-line);}
  .quote-meta{display:flex;justify-content:space-between;margin-top:11px;font-size:11px;color:var(--ep-ink-soft);}
  .quote-meta b{color:var(--ep-ink);font-weight:700;}

  footer{margin-top:24px;padding-top:14px;border-top:1px solid var(--ep-line);display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--ep-ink-soft);}
  .footer-brand{display:flex;align-items:center;gap:8px;}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="title-block">
      <div class="brandmark-row">
        <span class="ep-mark" aria-hidden="true">
          <img src="https://europarcsmakelaardij.nl/wp-content/uploads/2025/11/EP-roos-logo-819x1024.png"
               alt="EuroParcs" class="ep-mark-img"
               onerror="this.style.display='none';this.nextElementSibling.style.display='block';">
          <svg viewBox="0 0 48 48" width="100%" height="100%" style="display:none;">
            <circle cx="24" cy="24" r="24" fill="#fff"/>
            <g fill="#1f7ec4">
              <path d="M23.2 25c-.2 5 .2 9 .8 13h0c.6-4 1-8 .8-13-.5-.4-1.1-.4-1.6 0z"/>
              <path d="M24 9c-2.4 2.8-3.6 6-3.9 9.3-.2 2.4.3 4.4 1.5 6 .7.9 1.6 1.5 2.4 1.8.8-.3 1.7-.9 2.4-1.8 1.2-1.6 1.7-3.6 1.5-6C27.6 15 26.4 11.8 24 9z"/>
              <path d="M20.4 12.2c-1.8 2.4-2.7 5-2.9 7.6-.14 1.9.2 3.5 1 4.9.9-2 1.2-4.3 1.1-6.6-.08-2 .1-3.9.8-5.9z"/>
              <path d="M27.6 12.2c1.8 2.4 2.7 5 2.9 7.6.14 1.9-.2 3.5-1 4.9-.9-2-1.2-4.3-1.1-6.6.08-2-.1-3.9-.8-5.9z"/>
              <path d="M21 27c-2.8-2.4-6-3.6-9.2-3.4 2 4 5 6.8 8.8 8.2.6-1.6.7-3.2.4-4.8z"/>
              <path d="M27 27c2.8-2.4 6-3.6 9.2-3.4-2 4-5 6.8-8.8 8.2-.6-1.6-.7-3.2-.4-4.8z"/>
            </g>
          </svg>
        </span>
        <div class="eyebrow eyebrow-lg" id="parkTitle">Gastbeoordelingen dashboard</div>
      </div>
    </div>
  </div>
  <div class="clock-block">
    <div class="clock" id="clock">--:--</div>
    <div class="refresh-note"><span class="spin"></span><span id="refresh-note">Volgende update over 60:00</span></div>
  </div>
</header>

<div class="park-switch" id="parkSwitch"><span class="toggle-hint">Kies park:</span>
  <div class="park-dd" id="parkDd">
    <button class="park-dd-btn" id="parkDdBtn" aria-haspopup="listbox" aria-expanded="false">
      <span class="pdd-mark" id="pddMark"></span>
      <span class="pdd-name" id="pddName">EuroParcs</span>
      <svg class="pdd-chev" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
    </button>
    <div class="park-dd-list" id="parkDdList" role="listbox"></div>
  </div>
</div>

<div class="rail" id="toggleRow" aria-label="Toon of verberg reviewsites"></div>
<div class="grid" id="grid"></div>

<footer>
  <div class="footer-brand">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--ep-green)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6"/></svg>
    <span id="footerBrand">EuroParcs · gastbeoordelingen dashboard · vibed by Hoogvlieger</span>
  </div>
  <div id="lastUpdated">Laatst bijgewerkt: —</div>
</footer>

<script>
const ICONS = {
  booking:'<svg viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="16" rx="3" fill="#fff"/><text x="12" y="16.5" font-family="Georgia,serif" font-size="13" font-weight="700" fill="#003580" text-anchor="middle">B.</text></svg>',
  zoover:'<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" fill="#fff"/><path d="M8.5 9.5h7l-7 5h7" stroke="#FF6A00" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  google:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="#fff"/><path d="M12 11v2.4h3.4c-.15.9-.62 1.66-1.32 2.17v1.8h2.13c1.25-1.15 1.97-2.85 1.97-4.87 0-.47-.04-.92-.12-1.35H12z" fill="#4285F4"/><path d="M12 18.5c1.78 0 3.28-.59 4.34-1.6l-2.13-1.65c-.59.4-1.35.63-2.21.63-1.7 0-3.14-1.15-3.66-2.69H6.14v1.69A6.5 6.5 0 0 0 12 18.5z" fill="#34A853"/><path d="M8.34 13.19a3.9 3.9 0 0 1 0-2.48V9.02H6.14a6.5 6.5 0 0 0 0 5.86l2.2-1.69z" fill="#FBBC05"/><path d="M12 8.9c.96 0 1.82.33 2.5.98l1.87-1.87A6.24 6.24 0 0 0 12 6.5a6.5 6.5 0 0 0-5.86 3.62l2.2 1.69C8.86 10.05 10.3 8.9 12 8.9z" fill="#EA4335"/></svg>',
  special:'<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" fill="#fff"/><path d="M6 13.5 12 8l6 5.5" stroke="#1F9C8A" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/><path d="M8 12.5V17h8v-4.5" stroke="#1F9C8A" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>'
};
const ACCENTS = {booking:"var(--booking)",zoover:"var(--zoover)",google:"var(--google)",special:"var(--special)"};
const URLS = {booking:"booking.com",zoover:"zoover.nl",google:"Google Maps",special:"bungalowspecials.nl"};
const ORDER = ["booking","zoover","google","special"];
const checkSvg='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';

const grid=document.getElementById('grid');
const toggleRow=document.getElementById('toggleRow');
const parkSwitch=document.getElementById('parkSwitch');
const nf=new Intl.NumberFormat('nl-NL');

let DATA=null;        // volledige payload {updated, parks}
let currentPark=null; // sleutel van het actieve park

function fmt(n){ return (n==null)?'–':nf.format(n); }

function reviewCardHTML(id,s,link){
  const head = `
    <div class="card-head">
      <div class="site-ic" style="background:${ACCENTS[id]}">${ICONS[id]}</div>
      <div><div class="site-name">${s.name}</div><div class="site-url">${URLS[id]||''}</div></div>
    </div>`;
  const headLinked = link
    ? `<a class="card-head-link" href="${link}" target="_blank" rel="noopener" title="Bekijk op ${s.name}">${head}</a>`
    : head;
  const quoteBody = s.reviewMissing
    ? `<span class="no-review">review zonder tekst</span>`
    : (s.quote||'');
  const meta = `<div class="quote-meta"><b>\u2013 Gast</b><span>${s.when? ' \u00b7 '+s.when : ''}</span></div>`;
  return `
    ${headLinked}
    <div class="score-wrap"><span class="score">${s.score}</span><span class="score-max">/ ${s.max}</span></div>
    <div class="count">${/\d/.test(s.count||'') ? s.count : ''}</div>
    <div class="bar"><span data-pct="${s.pct||0}"></span></div>
    <div class="latest-tag">Laatste reactie</div>
    <div class="quote">${quoteBody}${meta}</div>`;
}

// Toon alleen een echte reviewer-naam of nette omschrijving; verberg
// site-placeholders zoals "Google-review", "Zoover-review", "BungalowSpecials".
function isRealName(a){
  if(!a) return false;
  const generic=/^(google-?review|zoover-?review|bungalowspecials|booking\.?com|google|zoover)$/i;
  return !generic.test(a.trim());
}

const tulipSvg='<svg viewBox="0 0 48 48" width="100%" height="100%"><g fill="#1f7ec4"><path d="M23.2 25c-.2 5 .2 9 .8 13h0c.6-4 1-8 .8-13-.5-.4-1.1-.4-1.6 0z"/><path d="M24 9c-2.4 2.8-3.6 6-3.9 9.3-.2 2.4.3 4.4 1.5 6 .7.9 1.6 1.5 2.4 1.8.8-.3 1.7-.9 2.4-1.8 1.2-1.6 1.7-3.6 1.5-6C27.6 15 26.4 11.8 24 9z"/><path d="M20.4 12.2c-1.8 2.4-2.7 5-2.9 7.6-.14 1.9.2 3.5 1 4.9.9-2 1.2-4.3 1.1-6.6-.08-2 .1-3.9.8-5.9z"/><path d="M27.6 12.2c1.8 2.4 2.7 5 2.9 7.6.14 1.9-.2 3.5-1 4.9-.9-2-1.2-4.3-1.1-6.6.08-2-.1-3.9-.8-5.9z"/><path d="M21 27c-2.8-2.4-6-3.6-9.2-3.4 2 4 5 6.8 8.8 8.2.6-1.6.7-3.2.4-4.8z"/><path d="M27 27c2.8-2.4 6-3.6 9.2-3.4-2 4-5 6.8-8.8 8.2-.6-1.6-.7-3.2-.4-4.8z"/></g></svg>';

/* Bouw de park-dropdown */
function buildParkSwitch(){
  const dd=document.getElementById('parkDd');
  const btn=document.getElementById('parkDdBtn');
  const list=document.getElementById('parkDdList');
  document.getElementById('pddMark').innerHTML=tulipSvg;

  list.innerHTML='';
  Object.entries(DATA.parks).forEach(([key,park])=>{
    const item=document.createElement('button');
    item.className='pdd-item'+(key===currentPark?' active':'');
    item.dataset.park=key;
    item.textContent='EuroParcs '+park.name;
    item.addEventListener('click',()=>{
      currentPark=key; dd.classList.remove('open'); btn.setAttribute('aria-expanded','false');
      renderPark();
    });
    list.appendChild(item);
  });

  btn.onclick=(e)=>{
    e.stopPropagation();
    const open=dd.classList.toggle('open');
    btn.setAttribute('aria-expanded', open?'true':'false');
  };
  if(!window.__parkDdBound){
    window.__parkDdBound=true;
    document.addEventListener('click',(e)=>{
      const d=document.getElementById('parkDd');
      if(d && !d.contains(e.target)){ d.classList.remove('open'); document.getElementById('parkDdBtn').setAttribute('aria-expanded','false'); }
    });
  }
}

function updateParkDdLabel(){
  const park=DATA.parks[currentPark];
  document.getElementById('pddName').textContent='EuroParcs '+park.name;
  document.querySelectorAll('.pdd-item').forEach(b=>b.classList.toggle('active',b.dataset.park===currentPark));
}

/* Render het actieve park: kop, tegels */
function renderPark(){
  const park=DATA.parks[currentPark];

  // titel + footer bijwerken
  document.getElementById('parkTitle').textContent='Gastbeoordelingen dashboard';
  document.getElementById('footerBrand').textContent='EuroParcs '+park.name+' · gastbeoordelingen dashboard · vibed by Hoogvlieger';

  // dropdown-label bijwerken
  updateParkDdLabel();

  // tegels
  grid.innerHTML=''; toggleRow.innerHTML='';
  ORDER.forEach(id=>{
    const s=park.sites[id]; if(!s) return;
    const card=document.createElement('div');
    card.className='card'; card.id='card-'+id;
    card.style.setProperty('--accent',ACCENTS[id]);
    card.innerHTML=reviewCardHTML(id,s,(park.links&&park.links[id])||null);
    grid.appendChild(card);

    const btn=document.createElement('button');
    btn.className='toggle-btn active'; btn.dataset.target='card-'+id; btn.title=s.name;
    btn.innerHTML=`<span class="toggle-ic" style="background:${ACCENTS[id]}">${ICONS[id]}</span>`;
    btn.addEventListener('click',()=>{
      const on=btn.classList.toggle('active');
      btn.classList.toggle('off',!on);
      document.getElementById(btn.dataset.target).classList.toggle('hidden',!on);
      updateCount();
    });
    toggleRow.appendChild(btn);
  });
  updateCount();
  requestAnimationFrame(()=>document.querySelectorAll('.bar span').forEach(el=>el.style.width=el.dataset.pct+'%'));
}

function updateCount(){
  const vis=document.querySelectorAll('.card:not(.hidden)').length;
  grid.className='grid count-'+vis;
}

function applyData(payload){
  DATA=payload;
  const keys=Object.keys(DATA.parks);
  if(!currentPark || !DATA.parks[currentPark]) currentPark=keys[0];
  buildParkSwitch();
  renderPark();
  if(DATA.updated){
    const u=new Date(DATA.updated);
    document.getElementById('lastUpdated').textContent='Laatst bijgewerkt: '+u.toLocaleDateString('nl-NL')+' '+u.toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'});
  }
}

async function load(){
  try{
    const r=await fetch('/api/data?ts='+Date.now(),{cache:'no-store'});
    applyData(await r.json());
  }catch(e){ console.warn('data laden mislukt',e); }
}
load();

/* klok */
function tickClock(){const n=new Date();document.getElementById('clock').textContent=n.toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'});}
tickClock();setInterval(tickClock,1000);

/* uur-aftelling + herladen (haalt verse /api/data op) */
let remaining=60*60*1000;
setInterval(()=>{
  remaining-=1000;
  if(remaining<=0){ location.reload(); return; }
  const m=Math.floor(remaining/60000),s=Math.floor((remaining%60000)/1000);
  document.getElementById('refresh-note').textContent='Volgende update over '+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
},1000);
</script>
</body>
</html>
